<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg:#15171b;
  --surface:#1c2026;
  --surface-2:#242931;
  --border:#323841;
  --text:#ECE9E2;
  --text-muted:#A8AEB8;
  --text-faint:#6b7280;
  --etapa1:#4D85AE;
  --etapa2:#C2933A;
  --etapa3:#5B9560;
  --etapa4:#B05454;
  --accent:#C9A24B;
  --accent-text:#1c2026;
  --danger:#B05454;
  --radius:10px;
  --font-display:'Fraunces', serif;
  --font-body:'IBM Plex Sans', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
}
button{font-family:var(--font-body);}
input,textarea,select{
  font-family:var(--font-body);
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:8px;
  padding:9px 11px;
  font-size:0.92rem;
  width:100%;
}
input:focus,textarea:focus,select:focus{
  outline:2px solid var(--accent);
  outline-offset:1px;
}
textarea{resize:vertical;min-height:64px;line-height:1.45;}
label{display:block;font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;font-weight:500;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media (max-width:560px){.field-row{grid-template-columns:1fr;}}

/* ---------- shell ---------- */
.app-shell{max-width:760px;margin:0 auto;padding:0 16px 60px;}
.topbar{
  position:sticky;top:0;z-index:5;
  background:var(--bg);
  padding:22px 0 14px;
  border-bottom:1px solid var(--border);
  margin-bottom:16px;
}
.topbar h1{
  font-family:var(--font-display);
  font-weight:600;
  font-size:1.6rem;
  margin:0 0 2px;
  letter-spacing:-0.01em;
}
.topbar .sub{
  font-family:var(--font-mono);
  font-size:0.72rem;
  color:var(--text-faint);
  text-transform:uppercase;
  letter-spacing:0.06em;
  margin-bottom:16px;
}
.topbar .sub .productor-name{color:var(--text-muted);}
.topbar .sub input{
  display:inline-block;width:170px;padding:2px 7px;font-size:0.72rem;
  font-family:var(--font-mono);border-radius:5px;vertical-align:middle;
}
.edit-link{
  background:none;border:none;color:var(--accent);font-family:var(--font-mono);
  font-size:0.68rem;text-decoration:underline;cursor:pointer;padding:0;margin-left:4px;
}
.stats-row{display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap;}
.stat{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);}
.stat b{color:var(--text);font-size:0.95rem;}

.toolbar{display:flex;gap:8px;align-items:center;}
.toolbar input[type="text"].search{flex:1;}
.storage-mode{margin-bottom:14px;}
/* ---------- producción ---------- */
.prod-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
.prod-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.prod-title{font-family:var(--font-display);font-weight:600;font-size:0.95rem;}
.prod-cards{display:flex;gap:10px;flex-wrap:wrap;}
.prod-card{flex:1;min-width:120px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.prod-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.03em;color:var(--text-faint);margin-bottom:4px;}
.prod-value{font-family:var(--font-display);font-weight:600;font-size:1.1rem;}
.mode-text{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-faint);margin-bottom:8px;line-height:1.4;}
.backup-actions{display:flex;gap:8px;flex-wrap:wrap;}
.chips{display:flex;gap:6px;margin:12px 0 4px;flex-wrap:wrap;}
.chip{
  font-family:var(--font-mono);font-size:0.72rem;
  padding:5px 11px;border-radius:99px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-muted);cursor:pointer;
  white-space:nowrap;
}
.chip.active{background:var(--surface-2);color:var(--text);border-color:var(--accent);}

.btn{
  border:none;border-radius:8px;padding:9px 16px;font-size:0.88rem;font-weight:500;
  cursor:pointer;transition:opacity .15s;
}
.btn:hover{opacity:0.88;}
.btn-accent{background:var(--accent);color:var(--accent-text);}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);}
.btn-sm{padding:6px 11px;font-size:0.78rem;}

/* ---------- quick add ---------- */
.quick-add{
  display:flex;gap:8px;background:var(--surface);border:1px solid var(--accent);
  border-radius:var(--radius);padding:10px;margin-bottom:14px;
}

/* ---------- list ---------- */
.list{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface);}
.row{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  opacity:0;transform:translateY(4px);transition:opacity .35s, transform .35s, background .15s;
}
.row.show{opacity:1;transform:translateY(0);}
.row:last-child{border-bottom:none;}
.row:hover{background:var(--surface-2);}
.row-main{min-width:0;flex:1;}
.row-name{font-family:var(--font-display);font-weight:600;font-size:1.02rem;}
.row-meta{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap;}
.badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted);}
.badge-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.row-date{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-faint);}

.progress-mini{display:flex;gap:3px;flex-shrink:0;}
.seg{width:7px;height:16px;border-radius:2px;border:1px solid var(--border);}

.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-muted);
  border:1px dashed var(--border);border-radius:var(--radius);
}
.empty-state p{margin:0 0 16px;font-size:0.92rem;}

/* ---------- detail overlay ---------- */
.overlay-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:20;
  display:none;
}
.overlay-bg.open{display:block;}
.detail-panel{
  position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;
  background:var(--bg);border-left:1px solid var(--border);
  z-index:21;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s ease;
}
.detail-panel.open{transform:translateX(0);}
@media (max-width:560px){.detail-panel{width:100vw;}}

.detail-head{padding:18px 18px 0;border-bottom:1px solid var(--border);}
.detail-head-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.detail-name-input{
  font-family:var(--font-display);font-weight:600;font-size:1.3rem;
  background:transparent;border:none;padding:0;margin-bottom:4px;
}
.detail-name-input:focus{outline:none;border-bottom:1px solid var(--accent);}
.close-btn{
  background:none;border:none;color:var(--text-muted);font-size:1.4rem;
  cursor:pointer;line-height:1;padding:2px 6px;
}
.estado-select{width:auto;display:inline-block;font-size:0.78rem;font-family:var(--font-mono);padding:5px 8px;margin-bottom:14px;}

.progress-big{display:flex;gap:5px;margin-bottom:14px;}
.seg-big{flex:1;height:6px;border-radius:3px;border:1px solid var(--border);cursor:pointer;}

.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:0;}
.tab-btn{
  font-family:var(--font-mono);font-size:0.74rem;white-space:nowrap;
  background:none;border:none;color:var(--text-faint);
  padding:9px 4px 11px;cursor:pointer;border-bottom:2px solid transparent;
}
.tab-btn.active{color:var(--text);border-bottom-color:var(--accent);}

.detail-body{padding:18px;overflow-y:auto;flex:1;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.etapa-block{margin-bottom:22px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.etapa-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.etapa-header .et-title{font-family:var(--font-display);font-weight:600;font-size:0.95rem;color:#fff;}
.etapa-header .et-time{font-family:var(--font-mono);font-size:0.7rem;color:rgba(255,255,255,0.75);}
.etapa-obj{padding:10px 14px 0;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em;}
.etapa-body{padding:6px 14px 14px;}

.check-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:10px;cursor:pointer;}
.check-row input[type="checkbox"]{width:17px;height:17px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);}
.check-row span{font-size:0.86rem;line-height:1.4;}

.banner{
  font-family:var(--font-display);font-style:italic;font-size:0.85rem;color:var(--text-muted);
  border-left:2px solid var(--accent);padding:10px 14px;margin-top:10px;line-height:1.5;
}

.research-actions{display:flex;gap:8px;margin:10px 0 16px;flex-wrap:wrap;}

.note-entry{border-bottom:1px solid var(--border);padding:10px 0;}
.note-entry:last-child{border-bottom:none;}
.note-date{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-faint);margin-bottom:3px;}
.note-text{font-size:0.86rem;line-height:1.45;white-space:pre-wrap;}

.save-indicator{
  font-family:var(--font-mono);font-size:0.68rem;color:var(--text-faint);
  text-align:right;padding:6px 18px 0;height:18px;
}

.danger-zone{margin-top:30px;padding-top:16px;border-top:1px solid var(--border);}

/* ---------- archivos tab ---------- */
.file-add-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.file-upload-btn{
  display:block;background:var(--surface-2);border:1px dashed var(--border);border-radius:8px;
  padding:11px 14px;font-size:0.84rem;color:var(--text-muted);cursor:pointer;text-align:center;flex:1;
}
.file-upload-btn:hover{border-color:var(--accent);color:var(--text);}
.file-hint{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-faint);margin:0 0 16px;line-height:1.4;}
.link-add-row{display:flex;gap:8px;margin-bottom:8px;}
.file-card{
  display:flex;align-items:center;gap:10px;border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;margin-bottom:8px;background:var(--surface);
}
.file-icon{font-size:1.25rem;flex-shrink:0;}
.file-info{flex:1;min-width:0;}
.file-name{font-size:0.85rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-meta{font-family:var(--font-mono);font-size:0.68rem;color:var(--text-faint);margin-top:2px;}
.file-actions{display:flex;gap:6px;flex-shrink:0;}

/* ---------- calc panel ---------- */
.calc-panel{
  position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100vw;
  background:var(--bg);border-left:1px solid var(--border);
  z-index:21;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s ease;
}
.calc-panel.open{transform:translateX(0);}
@media (max-width:560px){.calc-panel{width:100vw;}}
.result-cards{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.result-card{border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.result-card .rc-label{font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.03em;color:var(--text-faint);}
.result-card .rc-value{font-family:var(--font-display);font-weight:600;font-size:1.25rem;margin-top:3px;}
.result-card.conservador{border-left:3px solid #6B7280;}
.result-card.ponderado{border-left:3px solid var(--etapa1);}
.result-card.optimista{border-left:3px solid var(--etapa3);}
.calc-note{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-faint);margin-top:12px;line-height:1.5;}
.field-hint{font-weight:400;color:var(--text-faint);}
.proy-warning{color:var(--danger);font-size:0.78rem;margin:-8px 0 12px;}

@media (prefers-reduced-motion: reduce){
  .row,.detail-panel,.calc-panel{transition:none !important;}
}

/* ---------- import modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:30;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-box{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:24px;
}
.modal-box h2{font-family:var(--font-display);font-size:1.2rem;margin:0 0 6px;}
.modal-box p{font-size:0.85rem;color:var(--text-muted);margin:0 0 18px;line-height:1.5;}
.map-table{width:100%;border-collapse:collapse;margin-bottom:18px;}
.map-table th{text-align:left;font-family:var(--font-mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em;color:var(--text-faint);padding:6px 8px;border-bottom:1px solid var(--border);}
.map-table td{padding:7px 8px;border-bottom:1px solid var(--border);font-size:0.85rem;vertical-align:middle;}
.map-table td:first-child{font-family:var(--font-mono);font-size:0.78rem;color:var(--text-muted);}
.map-table select{padding:5px 7px;font-size:0.8rem;}
.import-preview{font-family:var(--font-mono);font-size:0.72rem;color:var(--text-faint);background:var(--surface-2);border-radius:6px;padding:8px 10px;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.import-actions{display:flex;gap:10px;justify-content:flex-end;}
/* Login screen */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:24px;}
#loginScreen.hidden{display:none;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px;display:flex;flex-direction:column;align-items:center;gap:20px;max-width:340px;width:90%;}
.login-logo{font-size:2rem;font-weight:700;color:var(--accent);letter-spacing:-0.03em;}
.login-sub{font-size:0.85rem;color:var(--text-muted);text-align:center;line-height:1.5;}
.btn-google{display:flex;align-items:center;gap:10px;background:#fff;color:#1f1f1f;border:1px solid #dadce0;border-radius:8px;padding:10px 20px;font-size:0.9rem;font-weight:500;cursor:pointer;width:100%;justify-content:center;transition:box-shadow .15s;}
.btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.15);}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.login-footer{font-size:0.72rem;color:var(--text-faint);text-align:center;}
.signout-btn{font-size:0.72rem;color:var(--text-faint);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0;}
.signout-btn:hover{color:var(--text-muted);}
</style>
</head>
<body>

<!-- Pantalla de login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Mi Cartera</div>
    <div class="login-sub">Financial Benefit · Zurich Life<br>Ingresá con tu cuenta de Google para acceder a tus datos desde cualquier dispositivo.</div>
    <button class="btn-google" id="googleSignInBtn">
      <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Continuar con Google
    </button>
    <div class="login-footer">Tus datos quedan guardados en tu cuenta personal y no son visibles para otros asesores.</div>
  </div>
</div>

<div class="app-shell">
  <div class="topbar">
    <h1>Mi Cartera</h1>
    <div class="sub" id="subLine"></div>
    <div class="stats-row" id="statsRow"></div>
    <div class="storage-mode" id="storageModeRow"></div>
    <div class="toolbar">
      <input type="text" class="search" id="searchInput" placeholder="Buscar por nombre...">
      <button class="btn btn-ghost" id="calcBtn">Calculadoras</button>
      <button class="btn btn-accent" id="addBtn">+ Nuevo</button>
    </div>
    <div class="chips" id="chipsRow"></div>
  </div>

  <div id="produccionRow"></div>
  <div id="quickAddWrap"></div>
  <div id="listWrap"></div>
</div>

<div class="overlay-bg" id="overlayBg"></div>
<div class="detail-panel" id="detailPanel"></div>
<div class="calc-panel" id="calcPanel"></div>
<div id="importModalWrap"></div>

<script>
/* ================= CONFIG ================= */
const ESTADOS = [
  {key:'Prospecto', color:'#6B7280'},
  {key:'En proceso', color:'var(--etapa1)'},
  {key:'Cliente activo', color:'var(--etapa3)'},
  {key:'Archivado', color:'#57534E'}
];

const ETAPAS = [
  {key:'etapa1', title:'Etapa 1 — Rapport y contexto', color:'var(--etapa1)', time:'~10 min',
   objetivo:'Generar confianza y conocer su mundo',
   questions:[
     {key:'q1', text:'¿A qué te dedicás? ¿Hace cuánto?'},
     {key:'q2', text:'¿Tenés familia, hijos? ¿De qué edades?'},
     {key:'q3', text:'¿Sos independiente o en relación de dependencia?'},
     {key:'q4', text:'¿Tus ingresos son estables o variables mes a mes?'}
   ]},
  {key:'etapa2', title:'Etapa 2 — Descubrimiento financiero', color:'var(--etapa2)', time:'~15 min',
   objetivo:'Entender hábitos, miedos y situación actual',
   questions:[
     {key:'q1', text:'Hoy, ¿tenés el hábito de ahorrar algo de lo que ganás?'},
     {key:'q2', text:'¿En qué lo tenés? ¿Pesos, dólares, propiedades?'},
     {key:'q3', text:'Si hoy tuvieras un imprevisto importante, ¿cómo lo resolverías?'},
     {key:'q4', text:'¿Qué es lo que más te preocupa financieramente hoy?'},
     {key:'q5', text:'¿Tuviste alguna mala experiencia con inversiones o ahorros antes?'}
   ]},
  {key:'etapa3', title:'Etapa 3 — Sueños y objetivos', color:'var(--etapa3)', time:'~10 min',
   objetivo:'Anclar el deseo a un número y un plazo',
   questions:[
     {key:'q1', text:'En 10 o 15 años, ¿cómo te imaginás tu vida idealmente?'},

/* Tasas proyectadas 2025 — fondos dólar (sección 4.5) */
const FONDOS_TASAS = {
  incomeDolarII: {conservador:3.90, ponderado:5.50, optimista:7.15},
  performanceIntl: {conservador:3.50, ponderado:5.00, optimista:6.50},
  money: {conservador:1.40, ponderado:2.00, optimista:2.60}
};
/* Estrategia recomendada por plazo (sección 4.4) */
function estrategiaPorPlazo(years){
  if(years>20) return [{f:'performanceIntl',w:0.8},{f:'incomeDolarII',w:0.2}];
  if(years>=11) return [{f:'performanceIntl',w:0.7},{f:'incomeDolarII',w:0.3}];
  if(years>=6) return [{f:'performanceIntl',w:0.5},{f:'incomeDolarII',w:0.5}];
  if(years>=3) return [{f:'performanceIntl',w:0.3},{f:'incomeDolarII',w:0.7}];
  return [{f:'performanceIntl',w:0.2},{f:'incomeDolarII',w:0.7},{f:'money',w:0.1}];
}
function blendedRate(years, scenario){
  return estrategiaPorPlazo(years).reduce((sum,m)=> sum + m.w * FONDOS_TASAS[m.f][scenario], 0);
}
function projectFV(primaMensual, years, annualRatePct){
  const months = years*12;
  const annual = annualRatePct/100;
  const i = Math.pow(1+annual, 1/12)-1;
  if(i===0) return primaMensual*months;
  return primaMensual * ((Math.pow(1+i, months)-1)/i) * (1+i);
}

function etapaProgress(contact, etapaKey){
  if(etapaKey==='etapa4'){

/* Calcula la prima anualizada de un cliente según su frecuencia de pago */
function primaAnualizada(c){
  const p = parseFloat(c.primaMonto)||0;
  if(c.frecuenciaPago==='anual')    return p;
  if(c.frecuenciaPago==='semestral') return p*2;
  return p*12; // mensual (default)
}

/* Estima la comisión total del plan usando el nivel del productor */
function calcComisionCliente(c){
  const nivelData = NIVELES_COMISION.find(n=>n.key===productorNivel);
  if(!nivelData || !c.primaMonto) return 0;
  const pa = primaAnualizada(c);
  const plan = c.plan;
  if(plan==='impact'){
    // Para Impact devuelvo la comisión del año 1 (la del año de cierre)
    const pp = parseFloat(c.primaMonto)||0;
    const pagosAnio = c.frecuenciaPago==='mensual' ? 12 : c.frecuenciaPago==='semestral' ? 2 : 1;
    return pp * 0.025 * pagosAnio;
  }
  if(plan==='proteccion') return pa * (nivelData.options/100);
  // Invest: prima anualizada × tasa% × años del plan (comisión total, pagada en año 1)
  const years = parseFloat(c.plazoPlan) || 0;
  return pa * (nivelData.invest/100) * years;
}

/* ================= STORAGE (Firebase Firestore) ================= */
const STORAGE_KEY   = 'cartera_contacts';
const PRODUCTOR_KEY = 'cartera_productor_nombre';
const NIVEL_KEY     = 'cartera_productor_nivel';

function userKvRef(key){
  // Sanitizar key para Firestore (no puede contener /)
  const safeKey = key.replace(/\//g,'__');
  return db.collection('users').doc(currentUser.uid).collection('kv').doc(safeKey);
}

async function storageGet(key){
  if(!currentUser){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  // Archivos grandes: localStorage local (no sincronizan entre dispositivos)
  if(key.startsWith('file:')){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  try{
    const snap = await userKvRef(key).get();
    return snap.exists ? snap.data().value : null;
  }catch(e){ return null; }
}

async function storageSet(key, value){
  if(!currentUser){
    try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
  }
  if(key.startsWith('file:')){
    try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
  }
  try{
    await userKvRef(key).set({ value });
    return true;
  }catch(e){ return false; }
}

async function storageDelete(key){
  if(!currentUser){
    try{ localStorage.removeItem(key); return true; }catch(e){ return false; }
  }
  if(key.startsWith('file:')){
    try{ localStorage.removeItem(key); return true; }catch(e){ return false; }
  }
  try{
    await userKvRef(key).delete();
    return true;
  }catch(e){ return false; }
}

async function loadContacts(){

/* ================= NESTED PATH UTIL ================= */
function getPath(obj, path){
  return path.split('.').reduce((o,k)=> (o==null? undefined : o[k]), obj);
}
function setPath(obj, path, value){
  const keys = path.split('.');
  let o = obj;
  for(let i=0;i<keys.length-1;i++){ o = o[keys[i]]; }
  o[keys[keys.length-1]] = value;
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(contacts, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cartera-respaldo-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

function importBackup(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!Array.isArray(data)) throw new Error('formato inválido');
      contacts = data;
      persist();
      renderStats(); renderList();
      flashMode(`Respaldo restaurado: ${contacts.length} contactos cargados.`);
    }catch(err){
      flashMode('No se pudo leer el archivo. Verificá que sea un respaldo .json válido.');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}
function flashMode(msg){
  const el = document.getElementById('storageModeRow');
  if(!el) return;
  const txt = el.querySelector('.mode-text');
  if(txt) txt.textContent = msg;
  setTimeout(renderStorageMode, 3000);
}

function renderFileCard(a){
  const icon = a.modo==='link' ? '🔗' : (a.mimeType && a.mimeType.startsWith('image/') ? '🖼️' : '📄');
  const metaTxt = a.modo==='link' ? 'Link externo' : `${a.sizeKB} KB · ${fmtDate(a.fecha)}`;
  return `<div class="file-card" data-fid="${a.id}">
    <div class="file-icon">${icon}</div>
    <div class="file-info">
      <div class="file-name">${escapeHtml(a.nombre)}</div>
      <div class="file-meta">${escapeHtml(a.categoria)} · ${metaTxt}</div>
    </div>
    <div class="file-actions">
      <button class="btn btn-ghost btn-sm" data-action="ver" data-fid="${a.id}">Ver</button>
      <button class="btn btn-danger btn-sm" data-action="borrar" data-fid="${a.id}">Borrar</button>
    </div>
  </div>`;
}
function bindArchivos(c){
  if(!c.archivos) c.archivos = [];
  const fileInput = document.getElementById('archFileInput');
  fileInput.addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const MAX_BYTES = 2*1024*1024;
    if(file.size > MAX_BYTES){
      alert('Ese archivo pesa más de 2MB. Usá el campo de link de abajo (ej: subilo a Drive y pegá el link).');
      fileInput.value=''; return;
    }
    const categoria = document.getElementById('arch-categoria').value;
    const reader = new FileReader();
    reader.onload = async ()=>{
      const dataUrl = reader.result;
      const fid = uid();
      const fileKey = 'file:'+c.id+':'+fid;
      const ok = await storageSet(fileKey, dataUrl);
      if(!ok){
        alert('No se pudo guardar el archivo. Probá con uno más liviano o usá el link.');
        return;
      }
      c.archivos.push({id:fid, nombre:file.name, categoria, modo:'subido', fecha:nowISO(), sizeKB:Math.round(file.size/1024), mimeType:file.type, fileKey});
      touch(c);
      refreshArchivosList(c);
    };
    reader.readAsDataURL(file);
    fileInput.value='';
  });

  document.getElementById('archAddLinkBtn').onclick = ()=>{
    const nameEl = document.getElementById('archLinkName');
    const urlEl = document.getElementById('archLinkUrl');
    const name = nameEl.value.trim();
    const url = urlEl.value.trim();
    if(name==='' || url==='') return;
    const categoria = document.getElementById('arch-categoria').value;
    c.archivos.push({id:uid(), nombre:name, categoria, modo:'link', fecha:nowISO(), link:url});
    touch(c);
    refreshArchivosList(c);
  };

  bindFileCardActions(c);
}
function refreshArchivosList(c){
  document.querySelector('.tab-panel[data-panel="archivos"]').innerHTML = tplArchivos(c);
  bindArchivos(c);
}
function bindFileCardActions(c){
  document.querySelectorAll('#archList [data-action="ver"]').forEach(btn=>{
    btn.onclick = async ()=>{
      const a = c.archivos.find(x=>x.id===btn.dataset.fid);
      if(!a) return;
      if(a.modo==='link'){ window.open(a.link, '_blank'); return; }
      const newWin = window.open('', '_blank');
      const dataUrl = await storageGet(a.fileKey);
      if(!dataUrl){ if(newWin) newWin.close(); alert('No se pudo recuperar el archivo.'); return; }
      try{
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        if(newWin) newWin.location.href = url;
      }catch(err){
        if(newWin) newWin.location.href = dataUrl;
      }
    };
  });
  document.querySelectorAll('#archList [data-action="borrar"]').forEach(btn=>{
    btn.onclick = async ()=>{
      const a = c.archivos.find(x=>x.id===btn.dataset.fid);
      if(!a) return;
      if(a.modo==='subido') await storageDelete(a.fileKey);
      c.archivos = c.archivos.filter(x=>x.id!==a.id);
      touch(c);
      refreshArchivosList(c);
    };
  });
}

}
function bindComision(){
  const tipo = document.getElementById('com-tipo');
  const nivel = document.getElementById('com-nivel');
  const prima = document.getElementById('com-prima');
  const anos = document.getElementById('com-anos');
  const anosField = document.getElementById('com-anos-field');
  const frecField = document.getElementById('com-frecuencia-field');
  const frecSel = document.getElementById('com-frecuencia');
  const formula = document.getElementById('com-formula');
  const resultado = document.getElementById('com-resultado');
  const primaLabel = document.getElementById('com-prima-label');
  const resultCards = document.getElementById('com-result-cards');

  function calc(){
    const n = NIVELES_COMISION.find(x=>x.key===nivel.value);
    const t = tipo.value;
    const primaVal = parseFloat(prima.value)||0;
    const years = parseFloat(anos.value)||0;

    // Mostrar/ocultar campos según tipo
    anosField.style.display = (t==='invest' || t==='impact') ? 'block' : 'none';
    frecField.style.display = t==='impact' ? 'block' : 'none';
    primaLabel.textContent = t==='impact' && frecSel.value==='anual' ? 'Prima anual' : 'Prima mensual';

    let monto = 0, formulaTxt = '';

    if(t==='invest'){
      const primaAnual = primaVal * 12;
      monto = primaAnual * (n.invest/100) * years;
      formulaTxt = `Prima anualizada ($${primaAnual.toLocaleString('es-AR',{maximumFractionDigits:0})}) × ${n.invest}% × ${years||0} años`;
      resultCards.innerHTML = `<div class="result-card ponderado"><div class="rc-label">Comisión total estimada</div><div class="rc-value" id="com-resultado">$${monto.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>`;

    } else if(t==='impact'){
      const frec = frecSel.value;
      primaLabel.textContent = frec==='anual' ? 'Prima anual' : frec==='semestral' ? 'Prima semestral' : 'Prima mensual';

      let com1, comPorPeriodo, detalle;
      if(frec==='mensual'){
        com1          = primaVal * 0.025 * 12;
        comPorPeriodo = primaVal * 12 * 0.005;       // prima × 12 × 0.5%
        detalle       = `Año 1: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})}/mes × 2,5% × 12 cuotas\nAño 2+: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})}/mes × 12 × 0,5% por año`;
      } else if(frec==='semestral'){
        com1          = primaVal * 0.025 * 2;
        comPorPeriodo = primaVal * 2 * 0.005;        // prima × 2 pagos × 0.5%
        detalle       = `Año 1: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})}/semestre × 2,5% × 2 cuotas\nAño 2+: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})}/semestre × 2 × 0,5% por año`;
      } else {
        com1          = primaVal * 0.025;
        comPorPeriodo = primaVal * 0.005;            // prima × 0.5%
        detalle       = `Año 1: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})} × 2,5%\nAño 2+: $${primaVal.toLocaleString('es-AR',{maximumFractionDigits:0})} × 0,5% por año`;
      }
      const com2plusTotal = comPorPeriodo * Math.max(years-1, 0);
      monto = com1 + com2plusTotal;
      formulaTxt = detalle;
      resultCards.innerHTML = `
        <div class="result-card conservador"><div class="rc-label">Año 1</div><div class="rc-value">$${com1.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>
        <div class="result-card ponderado"><div class="rc-label">Comisión año 2 en adelante (por año)</div><div class="rc-value">$${comPorPeriodo.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>
        <div class="result-card optimista"><div class="rc-label">Total del plan (${years||0} años)</div><div class="rc-value">$${monto.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>`;

    } else {
      // Protección
      const primaAnual = primaVal * 12;
      monto = primaAnual * (n.options/100);
      formulaTxt = `Prima anualizada ($${primaAnual.toLocaleString('es-AR',{maximumFractionDigits:0})}) × ${n.options}%`;
      resultCards.innerHTML = `<div class="result-card ponderado"><div class="rc-label">Comisión estimada</div><div class="rc-value">$${monto.toLocaleString('es-AR',{maximumFractionDigits:0})}</div></div>`;
    }

    formula.style.whiteSpace = 'pre-line';
    formula.textContent = formulaTxt;
  }

  tipo.addEventListener('change', calc);
  nivel.addEventListener('change', calc);
  prima.addEventListener('input', calc);
  anos.addEventListener('input', calc);
  frecSel.addEventListener('change', calc);
  calc();
}

/* ---- Proyección para el cliente ---- */
function tplProyeccion(){
  return `
    <div class="field">
      <label>Plan</label>
      <select id="proy-plan">
        ${PLANES.map(p=>`<option value="${p.key}">${p.label}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Plazo en años <span class="field-hint" id="proy-plazo-hint"></span></label>
      <input type="number" id="proy-plazo" step="1">
    </div>
    <div class="field">
      <label>Prima mensual en US$ <span class="field-hint" id="proy-prima-hint"></span></label>
      <input type="number" id="proy-prima" min="0" step="50">
    </div>
    <div class="proy-warning" id="proy-warning" style="display:none;"></div>
    <div class="result-cards" id="proy-resultados"></div>
    <div class="calc-note">Proyección en dólares con tasas estimadas 2025 según la estrategia de fondos recomendada por plazo (sección 4.4/4.5 de tu base). No es garantía de rendimiento — son escenarios proyectados que pueden variar.</div>
  `;
}
function bindProyeccion(){
  const planSel = document.getElementById('proy-plan');
  const plazoInput = document.getElementById('proy-plazo');
  const primaInput = document.getElementById('proy-prima');
  const plazoHint = document.getElementById('proy-plazo-hint');
  const primaHint = document.getElementById('proy-prima-hint');
  const warning = document.getElementById('proy-warning');
  const resultados = document.getElementById('proy-resultados');

  function applyPlan(){
    const plan = PLANES.find(p=>p.key===planSel.value);
    plazoHint.textContent = `(${plan.minYears}–${plan.maxYears} años)`;
    if(!plazoInput.value) plazoInput.value = plan.minYears;
    primaHint.textContent = plan.minPrima>0 ? `(mín. $${plan.minPrima.toLocaleString('es-AR')}/mes)` : '';
    calc();
  }

  function calc(){
    const plan = PLANES.find(p=>p.key===planSel.value);
    const years = parseFloat(plazoInput.value)||0;
    const prima = parseFloat(primaInput.value)||0;
    let warn = '';
    if(years>0 && (years < plan.minYears || years > plan.maxYears)){
      warn = `Este plan admite entre ${plan.minYears} y ${plan.maxYears} años de plazo.`;
    }
    if(plan.minPrima>0 && prima>0 && prima < plan.minPrima){
      warn += (warn?' ':'') + `La prima mínima para este plan es US$ ${plan.minPrima.toLocaleString('es-AR')}/mes.`;
    }
    warning.style.display = warn ? 'block' : 'none';
    warning.textContent = warn;

    if(years<=0 || prima<=0){ resultados.innerHTML=''; return; }
    const escenarios = [{key:'conservador',label:'Conservador'},{key:'ponderado',label:'Ponderado'},{key:'optimista',label:'Optimista'}];
    const aportado = prima*years*12;
    resultados.innerHTML = escenarios.map(e=>{
      const rate = blendedRate(years, e.key);
      const fv = projectFV(prima, years, rate);
      return `<div class="result-card ${e.key}">
        <div class="rc-label">${e.label} (~${rate.toFixed(2)}% anual)</div>
        <div class="rc-value">US$ ${fv.toLocaleString('es-AR',{maximumFractionDigits:0})}</div>
      </div>`;
    }).join('') + `<div class="calc-note">Total aportado en el período: US$ ${aportado.toLocaleString('es-AR',{maximumFractionDigits:0})}</div>`;
  }

  planSel.addEventListener('change', applyPlan);
  plazoInput.addEventListener('input', calc);
  primaInput.addEventListener('input', calc);
  applyPlan();
}

/* ===== Firebase Auth ===== */
document.getElementById('googleSignInBtn').onclick = async () => {
  const btn = document.getElementById('googleSignInBtn');
  btn.disabled = true;
  btn.textContent = 'Conectando…';
  const provider = new firebase.auth.GoogleAuthProvider();
  try {
    await auth.signInWithPopup(provider);
  } catch(err) {
    if(err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user'){
      // Fallback: redirect
      auth.signInWithRedirect(provider);
    } else {
      console.error('Error login:', err);
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 48 48" style="width:20px;height:20px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continuar con Google';
      alert('No se pudo iniciar sesión: ' + err.message);
    }
  }
};

// Manejar resultado de redirect (si volvió de un signInWithRedirect)
auth.getRedirectResult().then(result => {
  if(result && result.user) console.log('Login por redirect OK:', result.user.email);
}).catch(err => console.error('Redirect result error:', err));

auth.onAuthStateChanged(async user => {
  const loginScreen = document.getElementById('loginScreen');
  if(user){
    currentUser = user;
    loginScreen.classList.add('hidden');
    try{
      await init();
    }catch(e){
      console.error('Error en init:', e);
    }
  } else {
    currentUser = null;
    loginScreen.classList.remove('hidden');
  }
});
